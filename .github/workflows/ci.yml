name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test-and-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev,web,live]

      - name: Ruff lint
        run: ruff check .

      - name: Mypy strict modules
        run: mypy astrobridge/connectors.py astrobridge/api/orchestrator.py astrobridge/jobs.py

      - name: Run tests
        run: pytest
