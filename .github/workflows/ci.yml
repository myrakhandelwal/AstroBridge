name: CI

on:
  pull_request:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-and-quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,web,live]"

      - name: Lint
        run: ruff check .

      - name: Type check
        run: mypy astrobridge/connectors.py astrobridge/api/orchestrator.py astrobridge/jobs.py

      - name: Tests
        run: pytest -q
